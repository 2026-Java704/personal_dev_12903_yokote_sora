<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>ログイン</title>
</head>
<body>
<h1>スクワット</h1>
<form action="/login" method="post">

	<input type="password" name="password" placeholder="パスワード"><br>
	<button>ログイン</button>

</form>
<a href="/user">新規会員登録</a>
</body>
</html>
