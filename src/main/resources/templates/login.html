<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>ログイン</title>
	<link rel="stylesheet" type="text/css" href="/css/style.css">
</head>

<body>
	<h1 class="header">健康ダイエットアプリ</h1>
	<!--もいいけど北海道楽しんできてね!*/-->
	<h3>ようこそ！！</h3><br>
	<h4>ログインしてください</h4>
	<main>
		<form action="/login" method="post">
			<table>
				<tr>
					<th>
						名前</th>
					<td>
						<input type="text" name="name" placeholder="名前"><br>
					</td>
				</tr>
				<tr>
					<th>
						パスワード</th>
					<td>
						<input type="password" name="password" placeholder="パスワード"><br>
					</td>
				</tr>
				</table>
					<button class="loginbutton">ログイン</button>
					<br><span th:text="${message}" style="color: red"></span>
			
		</form><br>

		<a href="/users/new" class="p1">
			<p class="p1">まだご登録されていない方はこちら<br>
				新規会員登録</p>
		</a>
	</main>
	<footer th:replace="~{footer}"></footer>
</body>

</html>
